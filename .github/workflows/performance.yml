name: k6 Performance Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  load-test:
    name: Load Test — SLA Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run load test
        run: |
          mkdir -p reports
          k6 run --out json=reports/results.json tests/load/load-test.ts

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: reports/results.json
          if-no-files-found: ignore